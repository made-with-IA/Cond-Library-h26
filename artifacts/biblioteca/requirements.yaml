packages:
  "framer-motion": "For page transitions and smooth UI micro-interactions"
  "lucide-react": "For beautiful, consistent iconography across the application"
  "date-fns": "For formatting dates nicely in the UI"
  "papaparse": "For client-side CSV export functionality on the reports page"
  "@types/papaparse": "TypeScript definitions for papaparse"
  "recharts": "For rendering beautiful charts on the admin dashboard"
  "react-hook-form": "For robust form state management"
  "@hookform/resolvers": "For integrating Zod validation with react-hook-form"
  "zod": "For schema validation on frontend forms"
  "clsx": "For conditional tailwind class joining"
  "tailwind-merge": "For merging tailwind classes without conflicts"
  "wouter": "For lightweight frontend routing"

images:
  - path: "artifacts/biblioteca/public/images/library-hero.png"
    description: "A beautiful, bright, welcoming community library interior with warm lighting, wooden bookshelves, and comfortable reading nooks. Clean professional architectural photography."
    aspect_ratio: "16:9"
  - path: "artifacts/biblioteca/public/images/book-placeholder.png"
    description: "A minimalist, elegant blank book cover template with a subtle fabric texture in warm beige and gold tones. Neutral and sophisticated."
    aspect_ratio: "3:4"

notes:
  - The application uses @workspace/api-client-react for all API interactions
  - Auth tokens are managed in localStorage and injected via customFetch's setAuthTokenGetter
