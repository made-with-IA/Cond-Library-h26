kind = "web"
previewPath = "/"
title = "Biblioteca do Condomínio"
version = "1.0.0"
id = "artifacts/biblioteca"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25303

[services.development]
run = "pnpm --filter @workspace/biblioteca run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/biblioteca", "run", "build" ]
publicDir = "artifacts/biblioteca/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25303"
BASE_PATH = "/"
